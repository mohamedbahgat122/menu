<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة المشروبات - X</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">كافيه <span class="logo-x">X</span></h1>
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="ابحث عن مشروبك..."
                    class="search-input"
                >
            </div>
        </header>

        <nav class="categories">
            <button class="category-btn active" data-category="drinks">مشروبات</button>
            <button class="category-btn" data-category="food">طعام</button>
            <button class="category-btn" data-category="dessert">حلويات</button>
        </nav>
        
        <nav class="subcategories" id="subcategories">
            <!-- Food Sub-categories -->
            <div class="food-subcategories" id="foodSubcategories">
                <button class="subcategory-btn" data-subcategory="all">الكل</button>
                <button class="subcategory-btn" data-subcategory="grilled">مشويات</button>
                <button class="subcategory-btn" data-subcategory="meals">وجبات</button>
                <button class="subcategory-btn" data-subcategory="appetizers">مقبلات</button>
                <button class="subcategory-btn" data-subcategory="sandwiches">سندوتشات</button>
            </div>
            
            <!-- Drinks Sub-categories -->
            <div class="drinks-subcategories" id="drinksSubcategories">
                <button class="subcategory-btn" data-subcategory="all">الكل</button>
                <button class="subcategory-btn active" data-subcategory="cold">ساقع</button>
                <button class="subcategory-btn" data-subcategory="hot">ساخن</button>
                <button class="subcategory-btn" data-subcategory="carbonated">غازي</button>
                <button class="subcategory-btn" data-subcategory="extras">إضافات</button>
            </div>
        </nav>

        <main class="menu-grid" id="menuGrid">
            <!-- Menu items will be dynamically inserted here -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
